<!DOCTYPE html>
<html lang="ko" class="light">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
  <title>GOLDENBRIDGE | 간편 신청서</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <!-- Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            primary: "#002045",
            secondary: "#7b5800",
            accent: "#2563eb",
            accentBg: "#eff6ff",
            background: "#f8f9ff"
          }
        }
      }
    }
  </script>

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");

    body {
      background-color: #f8f9ff;
      color: #0d1c2f;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
    }

    /* Interactive Loan Options Card CSS */
    .loan-card:has(input:checked) {
      border-color: #2563eb;
      background-color: #eff6ff;
      color: #1e40af;
      transform: scale(1.02);
      box-shadow: 0 4px 12px rgba(37, 99, 235, 0.08);
    }
    
    .loan-card:has(input:checked) span.material-symbols-outlined {
      color: #2563eb;
      font-variation-settings: 'FILL' 1;
    }

    .loan-card:has(input:checked) .check-indicator {
      opacity: 1;
      transform: scale(1);
    }

    /* Custom Pulse breathing animation for high-contrast Submit Button */
    @keyframes button-breathing {
      0%, 100% {
        box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.4), 0 4px 6px -2px rgba(37, 99, 235, 0.2);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.5), 0 8px 10px -6px rgba(37, 99, 235, 0.25);
        transform: scale(1.015);
      }
    }

    .btn-emphasis {
      animation: button-breathing 2.5s infinite ease-in-out;
    }

    /* Modal Animation */
    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: scale(0.95);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .modal-animate {
      animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col justify-center items-center py-8 px-4 overflow-y-auto select-none">

  <!-- Main Card Container -->
  <div class="w-full max-w-md bg-white rounded-2xl border border-slate-200/80 shadow-2xl p-6 flex flex-col space-y-4 relative">
    
    <!-- Header Section -->
    <div class="text-center space-y-1">
      <img src="goldenbridge.png" alt="GOLDENBRIDGE Logo" class="h-10 mx-auto object-contain" />
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">간편 신청하기</h1>
      <p class="text-[11px] font-semibold text-slate-500">30초만에 끝나는 신청, 전문 상담사가 직접 연락드립니다.</p>
    </div>

    <!-- Application Form -->
    <form id="apply-form" class="space-y-4">
      
      <!-- Name Field -->
      <div class="space-y-1">
        <label for="applicant-name" class="text-xs font-extrabold text-slate-700 block">신청인</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
          <input 
            type="text" 
            id="applicant-name" 
            name="applicant-name"
            required 
            placeholder="성함을 입력하세요" 
            class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300/80 rounded-xl focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm font-medium transition-all"
          />
        </div>
      </div>

      <!-- Phone Field -->
      <div class="space-y-1">
        <label for="applicant-phone" class="text-xs font-extrabold text-slate-700 block">연락처</label>
        <div class="relative">
          <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">phone_iphone</span>
          <input 
            type="tel" 
            id="applicant-phone" 
            name="applicant-phone"
            required 
            placeholder="010-0000-0000" 
            class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300/80 rounded-xl focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-sm font-medium transition-all"
          />
        </div>
      </div>

      <!-- Loan Selection Section ("눈에 확 들어오게!") -->
      <div class="space-y-1">
        <div class="flex justify-between items-center mb-1">
          <span class="text-xs font-extrabold text-slate-700">대출 상품 선택</span>
          <span class="text-[10px] font-bold text-red-500 px-2 py-0.5 bg-red-50 rounded border border-red-200/60 animate-pulse">선택 가능</span>
        </div>
        <div class="grid grid-cols-3 gap-2">
          <!-- Option 1: 주택 담보 대출 -->
          <label class="loan-card relative border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center text-center cursor-pointer transition-all hover:bg-slate-50 hover:border-slate-300 select-none">
            <input type="radio" name="loan-type" value="주택 담보 대출" class="sr-only" checked />
            
            <!-- Checkmark Indicator -->
            <span class="check-indicator opacity-0 scale-75 absolute top-1.5 right-1.5 bg-blue-600 text-white rounded-full p-0.5 flex items-center justify-center transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </span>
            
            <span class="material-symbols-outlined text-2xl mb-1 text-slate-400 transition-colors">home</span>
            <span class="text-xs font-bold text-slate-700 block tracking-tight">주택 담보</span>
            <span class="text-[9px] text-slate-400 font-bold">대출</span>
          </label>

          <!-- Option 2: 차량 담보 대출 -->
          <label class="loan-card relative border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center text-center cursor-pointer transition-all hover:bg-slate-50 hover:border-slate-300 select-none">
            <input type="radio" name="loan-type" value="차량 담보 대출" class="sr-only" />
            
            <!-- Checkmark Indicator -->
            <span class="check-indicator opacity-0 scale-75 absolute top-1.5 right-1.5 bg-blue-600 text-white rounded-full p-0.5 flex items-center justify-center transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </span>

            <span class="material-symbols-outlined text-2xl mb-1 text-slate-400 transition-colors">directions_car</span>
            <span class="text-xs font-bold text-slate-700 block tracking-tight">차량 담보</span>
            <span class="text-[9px] text-slate-400 font-bold">대출</span>
          </label>

          <!-- Option 3: 신용 대출 -->
          <label class="loan-card relative border border-slate-200 rounded-xl p-3 flex flex-col items-center justify-center text-center cursor-pointer transition-all hover:bg-slate-50 hover:border-slate-300 select-none">
            <input type="radio" name="loan-type" value="신용 대출" class="sr-only" />
            
            <!-- Checkmark Indicator -->
            <span class="check-indicator opacity-0 scale-75 absolute top-1.5 right-1.5 bg-blue-600 text-white rounded-full p-0.5 flex items-center justify-center transition-all duration-200">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-2 w-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            </span>

            <span class="material-symbols-outlined text-2xl mb-1 text-slate-400 transition-colors">credit_card</span>
            <span class="text-xs font-bold text-slate-700 block tracking-tight">신용</span>
            <span class="text-[9px] text-slate-400 font-bold">대출</span>
          </label>
        </div>
      </div>

      <!-- Inquiries Field (Optional) -->
      <div class="space-y-1">
        <label for="applicant-message" class="text-xs font-extrabold text-slate-700 block">문의사항 (선택)</label>
        <textarea 
          id="applicant-message" 
          name="applicant-message"
          placeholder="궁금하신 점이 있다면 편하게 남겨주세요." 
          rows="2" 
          class="w-full px-3 py-2 bg-slate-50 border border-slate-300/80 rounded-xl focus:bg-white focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-xs font-medium transition-all resize-none"
        ></textarea>
      </div>

      <!-- Consent Agreement -->
      <div class="flex items-start gap-2 pt-1">
        <input 
          type="checkbox" 
          id="terms" 
          checked 
          class="mt-0.5 w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer"
        />
        <label for="terms" class="text-[11px] font-semibold text-slate-500 leading-tight cursor-pointer select-none">
          개인정보 수집 및 이용에 동의합니다. (상담 진행을 목적으로만 안전하게 사용됩니다.)
        </label>
      </div>

      <!-- Submit Button -->
      <button 
        type="submit" 
        id="submit-btn" 
        class="btn-emphasis w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-base rounded-xl transition-all shadow-lg active:scale-[0.98] mt-2 relative overflow-hidden flex items-center justify-center gap-2 group cursor-pointer"
      >
        <span>신청 완료하기</span>
        <span class="material-symbols-outlined text-lg transition-transform group-hover:translate-x-1">arrow_forward</span>
      </button>

    </form>
  </div>

  <!-- Footer Info -->
  <div class="text-center text-[10px] text-slate-400/80 font-semibold mt-4">
    <p>© 2026 GOLDENBRIDGE. All rights reserved.</p>
  </div>

  <!-- Modal for Desktop SMS Submission (Matches template from recruitment page) -->
  <div 
    id="desktop-sms-modal" 
    class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4"
  >
    <div class="bg-white rounded-2xl shadow-2xl border border-slate-200 max-w-sm w-full p-6 space-y-4 relative modal-animate">
      
      <!-- Close Button -->
      <button 
        id="close-modal" 
        class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors focus:outline-none cursor-pointer"
      >
        <span class="material-symbols-outlined text-2xl">close</span>
      </button>

      <!-- Modal Header -->
      <div class="text-center space-y-2">
        <div class="w-12 h-12 bg-blue-50 text-blue-600 mx-auto flex items-center justify-center rounded-full">
          <span class="material-symbols-outlined text-3xl font-bold">chat</span>
        </div>
        <h3 class="text-lg font-black text-slate-900">간편 신청 문자 전송 안내</h3>
        <p class="text-slate-500 text-xs leading-relaxed">PC 환경에서는 문자 앱을 직접 실행할 수 없습니다. 아래 수신 번호와 문자 내용을 복사하여 보내주시기 바랍니다.</p>
      </div>

      <!-- Modal Content Copy Boxes -->
      <div class="bg-slate-50 p-4 rounded-xl border border-slate-200/60 space-y-3">
        <!-- Recipient Number -->
        <div>
          <span class="font-extrabold text-[10px] text-slate-500 block mb-1">수신 번호</span>
          <div class="flex justify-between items-center bg-white border border-slate-200 rounded-lg px-3 py-2 shadow-sm">
            <span class="text-sm font-bold text-blue-600 font-mono">010-8776-1350</span>
            <button 
              id="copy-number-btn" 
              class="text-xs text-blue-600 hover:underline flex items-center gap-1 font-extrabold focus:outline-none cursor-pointer"
            >
              <span class="material-symbols-outlined text-sm font-bold">content_copy</span> 복사
            </button>
          </div>
        </div>

        <!-- SMS Body Content -->
        <div>
          <span class="font-extrabold text-[10px] text-slate-500 block mb-1">문자 내용</span>
          <div class="relative bg-white border border-slate-200 rounded-lg px-3 py-2.5 shadow-sm">
            <pre 
              id="sms-text-content" 
              class="text-xs font-sans whitespace-pre-wrap text-slate-700 break-all select-all max-h-40 overflow-y-auto leading-relaxed"
            ></pre>
            <button 
              id="copy-text-btn" 
              class="absolute top-2 right-2 text-[10px] text-blue-600 hover:underline flex items-center gap-1 bg-white/90 px-2 py-1 rounded border border-slate-200 font-extrabold focus:outline-none cursor-pointer shadow-sm"
            >
              <span class="material-symbols-outlined text-xs font-bold">content_copy</span> 복사
            </button>
          </div>
        </div>
      </div>

      <!-- Action Button -->
      <button 
        id="modal-close-btn" 
        class="w-full py-3 bg-slate-900 text-white font-extrabold text-sm rounded-xl hover:bg-slate-800 transition-colors focus:outline-none cursor-pointer"
      >
        확인했습니다
      </button>

    </div>
  </div>

  <!-- JavaScript Logic -->
  <script>
    // 1. KakaoTalk In-App Browser auto-escape to default browser
    const userAgentLower = navigator.userAgent.toLowerCase();
    if (userAgentLower.includes('kakaotalk')) {
      window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(window.location.href);
    }

    // 2. Phone Auto-Hyphenation Formatting
    const phoneInput = document.getElementById('applicant-phone');
    phoneInput.addEventListener('input', (e) => {
      let val = e.target.value.replace(/[^0-9]/g, '');
      if (val.length > 3 && val.length <= 7) {
        val = val.slice(0, 3) + '-' + val.slice(3);
      } else if (val.length > 7) {
        val = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7, 11);
      }
      e.target.value = val;
    });

    // 3. Form Validation and SMS Processing
    const form = document.getElementById('apply-form');
    const desktopModal = document.getElementById('desktop-sms-modal');
    const smsTextContent = document.getElementById('sms-text-content');

    function isMobileDevice() {
      return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Check personal info consent
      const termsChecked = document.getElementById('terms').checked;
      if (!termsChecked) {
        alert('개인정보 수집 및 이용에 동의하셔야 신청이 완료됩니다.');
        return;
      }

      const name = document.getElementById('applicant-name').value.trim();
      const phone = document.getElementById('applicant-phone').value.trim();
      const loanType = document.querySelector('input[name="loan-type"]:checked').value;
      const message = document.getElementById('applicant-message').value.trim() || '없음';

      // Validate phone format
      const phoneRegex = /^01[016789]-\d{3,4}-\d{4}$/;
      if (!phoneRegex.test(phone)) {
        alert('올바른 연락처 형식을 입력해주세요. (예: 010-1234-5678)');
        return;
      }

      // Compile message text
      const smsText = `[골든브릿지 간편신청]
신청인: ${name}
연락처: ${phone}
신청상품: ${loanType}
문의사항: ${message}

위 내용으로 금융 상담을 신청합니다.`;

      if (isMobileDevice()) {
        const smsNumber = '01087761350';
        const encodedText = encodeURIComponent(smsText);
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const smsUrl = isIOS ? `sms:${smsNumber}&body=${encodedText}` : `sms:${smsNumber}?body=${encodedText}`;

        alert('신청이 확인되었습니다. 문자 전송 창으로 이동하면 전송 버튼을 눌러주세요.');
        window.location.href = smsUrl;
      } else {
        // Desktop Modal
        smsTextContent.textContent = smsText;
        desktopModal.classList.remove('hidden');
      }
    });

    // 4. Modal Interactions
    function closeModal() {
      desktopModal.classList.add('hidden');
    }

    document.getElementById('close-modal').addEventListener('click', closeModal);
    document.getElementById('modal-close-btn').addEventListener('click', closeModal);

    // Close on click outside modal content
    desktopModal.addEventListener('click', (e) => {
      if (e.target === desktopModal) {
        closeModal();
      }
    });

    // 5. Copy Buttons Functional implementation
    document.getElementById('copy-number-btn').addEventListener('click', () => {
      navigator.clipboard.writeText('010-8776-1350').then(() => {
        alert('수신 번호(010-8776-1350)가 복사되었습니다.');
      }).catch(err => {
        console.error('Copy failed:', err);
      });
    });

    document.getElementById('copy-text-btn').addEventListener('click', () => {
      const text = smsTextContent.textContent;
      navigator.clipboard.writeText(text).then(() => {
        alert('신청 문자 내용이 복사되었습니다.');
      }).catch(err => {
        console.error('Copy failed:', err);
      });
    });
  </script>
</body>
</html>
